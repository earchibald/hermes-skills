<svg width="1024" height="1024" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="45%">
      <stop offset="0%" stop-color="#1A1D23" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>

    <!-- Primary glow filter -->
    <filter id="primaryGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0F"/>
  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <!-- ===================== -->
  <!-- PRIMARY MOTIF — Replace with your agent's main visual -->
  <!-- ===================== -->

  <!-- Example: centered circle as placeholder -->
  <circle cx="200" cy="180" r="60" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="180" r="45" fill="none" stroke="#1A1A3E" stroke-width="4"/>
  <circle cx="200" cy="180" r="15" fill="#00E5FF" opacity="0.8" filter="url(#primaryGlow)"/>

  <!-- ===================== -->
  <!-- SECONDARY MOTIF — Accent elements -->
  <!-- ===================== -->

  <!-- ===================== -->
  <!-- NAMEPLATE -->
  <!-- ===================== -->
  <text x="200" y="355" font-family="monospace" font-size="26" font-weight="600"
        fill="#00E5FF" text-anchor="middle" opacity="0.5" letter-spacing="3">AGENT</text>
  <line x1="60" y1="348" x2="140" y2="348" stroke="#1A1A2E" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="348" x2="340" y2="348" stroke="#1A1A2E" stroke-width="1" opacity="0.5"/>
</svg>
